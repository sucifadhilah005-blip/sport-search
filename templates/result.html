<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hasil Pencarian</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* NAVBAR */
.navbar {
    background: #1e3c72;
    padding: 15px 40px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar-title {
    font-size: 20px;
    font-weight: bold;
}

/* SEARCH BAR TOP */
.search-bar input {
    padding: 8px;
    border-radius: 20px;
    border: none;
    width: 250px;
}

.search-bar button {
    padding: 8px 15px;
    border: none;
    border-radius: 20px;
    background: #2a5298;
    color: white;
    cursor: pointer;
}

/* CONTENT */
.container {
    max-width: 800px;
    margin: 30px auto;
}

/* BACK BUTTON */
.back-btn {
    display: inline-block;
    margin-bottom: 20px;
    padding: 8px 15px;
    background: #2a5298;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

/* INFO */
.result-info {
    margin-bottom: 20px;
    color: #555;
}

/* CARD */
.card {
    background: white;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
}

.card h3 {
    margin: 0;
    color: #1e3c72;
}

.card p {
    color: #555;
}

.card a {
    text-decoration: none;
    color: #2a5298;
    font-weight: bold;
}

.score {
    font-size: 12px;
    color: gray;
    margin-top: 5px;
}
</style>
</head>

<body>
<!-- NAVBAR -->
<div class="navbar">
    <div class="navbar-title">SportSearch</div>

    <form action="/search" method="post" class="search-bar">
        <input type="text" name="query" value="{{ query }}" placeholder="Cari lagi...">
        <button type="submit">Cari</button>
    </form>
</div>

<div class="container">

    <div class="result-info">
        Hasil untuk: <b>{{ query }}</b>
    </div>

    <!-- HASIL -->
    {% if results %}
        {% for r in results %}
        <div class="card">
            <h3>{{ r.title }}</h3>
            <p>{{ r.content }}...</p>
            <a href="{{ r.url }}" target="_blank">Baca selengkapnya</a>
            <div class="score">Score: {{ r.score }}</div>
        </div>
        {% endfor %}
    {% else %}
        <p>Tidak ada hasil ditemukan.</p>
    {% endif %}

    <!-- TOMBOL KEMBALI -->
    <a href="/" class="back-btn">Kembali ke Halaman Awal</a>

</div>

</body>
</html>
