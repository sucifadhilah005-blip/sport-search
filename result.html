<!DOCTYPE html>
<html>
<head>
    <title>Hasil Pencarian</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .result {
            border-bottom: 1px solid #ccc;
            margin-bottom: 15px;
            padding-bottom: 10px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .back-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- TOMBOL KEMBALI -->
    <a href="/" class="back-btn">← Kembali ke Halaman Awal</a>

    <h2>Hasil pencarian untuk: "{{ query }}"</h2>

    {% if results %}
        {% for r in results %}
        <div class="result">
            <h3>{{ r.title }}</h3>
            <p>{{ r.content }}</p>
            <a href="{{ r.url }}" target="_blank">Baca Selengkapnya</a>
            <p><b>Score:</b> {{ r.score }}</p>
        </div>
        {% endfor %}
    {% else %}
        <p>Tidak ada hasil ditemukan.</p>
    {% endif %}

</body>
</html>
